ai_usage_summary: |
  ChatGPT was used for architecture discussion, debugging,
  code review, ranking logic refinement, GitHub setup guidance,
  and documentation assistance. All implementation,
  experimentation, scoring design, testing, candidate inspection,
  runtime optimization, and final submission preparation were
  performed by the team.


# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  RecruitAI is a hybrid AI-powered candidate ranking system built
  for the Redrob Data & AI Challenge. The system first performs
  semantic retrieval using Sentence Transformers embeddings and
  cosine similarity to identify the most relevant candidates.
  Retrieved candidates are then ranked using a multi-factor scoring
  framework combining semantic relevance, career alignment,
  experience suitability, behavioral signals, retrieval expertise,
  production ML experience, company quality, and honeypot
  protection. Candidate reasoning is generated from profile facts,
  skills, career history, and recruiter signals to provide
  transparent recruiter-friendly explanations. The final ranking
  pipeline processes a 100K-candidate dataset and produces the
  Top-100 shortlist in approximately 30 seconds after embedding
  precomputation.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true        # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
