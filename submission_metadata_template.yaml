# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform:  "Local Windows Machine"                 # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 12                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.13.7"                      # python --version
  os: "Windows 11 Home Single Language"                           # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: true               # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 25              # Approximate, if applicable

